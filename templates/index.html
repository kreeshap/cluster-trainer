<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cluster Trainer — Sign In</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;900&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>

<div id="page-signin"> ... </div>
<div id="page-signup" class="hidden"> ... </div>
<div id="page-forgot" class="hidden"> ... </div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="{{ url_for('static', filename='common.js') }}"></script>

<script>
const PAGES = ['signin','signup','forgot'];
function show(name) { PAGES.forEach(p => document.getElementById('page-'+p).classList.toggle('hidden', p!==name)); }
function errMsg(id,msg){ const e=document.getElementById(id); e.textContent=msg; e.classList.add('show'); }
function clrMsg(id)    { const e=document.getElementById(id); e.textContent=''; e.classList.remove('show'); }
function setBtn(id,busy,lbl){ const b=document.getElementById(id); b.disabled=busy; b.textContent=busy?'Please wait…':lbl; }

// SIGN IN
document.getElementById('btn-signin').onclick = async () => {
  clrMsg('si-err');
  const email=document.getElementById('si-email').value.trim(), pass=document.getElementById('si-pass').value;
  if(!email||!pass) return errMsg('si-err','Please fill in all fields.');
  setBtn('btn-signin',true,'Sign In');
  
  // Use 'sb' which is defined in common.js
  const {error} = await sb.auth.signInWithPassword({email,password:pass});
  setBtn('btn-signin',false,'Sign In');
  
  if(error) return errMsg('si-err',error.message);
  window.location.href='/dashboard.html'; 
};

// SIGN UP
document.getElementById('btn-signup').onclick = async () => {
  clrMsg('su-err');
  const email=document.getElementById('su-email').value.trim(), pass=document.getElementById('su-pass').value;
  if(!email||!pass) return errMsg('su-err','Please fill in all fields.');
  if(pass.length<6) return errMsg('su-err','Password must be at least 6 characters.');
  setBtn('btn-signup',true,'Sign Up');
  
  const {data,error} = await sb.auth.signUp({email,password:pass});
  setBtn('btn-signup',false,'Sign Up');
  
  if(error) return errMsg('su-err',error.message);
  if(data.session){ 
    window.location.href='/dashboard.html'; 
  } else {
    const e=document.getElementById('su-err');
    e.textContent='✓ Check your email to confirm your account.';
    e.style.cssText='display:block;color:#4ade80;border-color:rgba(74,222,128,.35);background:rgba(74,222,128,.08)';
  }
};

// FORGOT PASSWORD
document.getElementById('btn-forgot').onclick = async () => {
  clrMsg('fp-err'); clrMsg('fp-ok');
  const email=document.getElementById('fp-email').value.trim();
  if(!email) return errMsg('fp-err','Please enter your email.');
  setBtn('btn-forgot',true,'Send Reset Link');
  
  const {error} = await sb.auth.resetPasswordForEmail(email,{redirectTo:location.origin+'/'});
  setBtn('btn-forgot',false,'Send Reset Link');
  
  if(error) return errMsg('fp-err',error.message);
  const ok=document.getElementById('fp-ok'); ok.textContent='✓ Reset link sent — check your inbox.'; ok.classList.add('show');
};

// Navigation
document.getElementById('go-signup').onclick  = ()=>show('signup');
document.getElementById('go-signin').onclick  = ()=>show('signin');
document.getElementById('go-forgot').onclick  = ()=>show('forgot');
document.getElementById('go-signin2').onclick = ()=>show('signin');

// Auto-redirect if already logged in
(async()=>{
  if (typeof sb !== 'undefined') {
    const {data:{session}}=await sb.auth.getSession();
    if(session) window.location.href='/dashboard.html';
  }
})();
</script>
</body>
</html>
