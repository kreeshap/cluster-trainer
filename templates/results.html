<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cluster Trainer — Results</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;900&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body style="padding-top:60px">

<div class="topbar">
  <div class="topbar-brand">CLUSTER <span>TRAINER</span></div>
  <div class="topbar-right">
    <div class="user-chip" id="topbar-name"></div>
    <button class="btn-icon" id="btn-settings" title="Settings">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
    <button class="btn-sm" id="btn-logout">Log Out</button>
  </div>
</div>

<div class="results-wrap">
  <h2 class="results-title" id="res-title">Nice <span>Work!</span></h2>
  <p class="results-sub" id="res-sub">Here's how you did</p>

  <div class="score-ring-wrap">
    <div class="score-ring">
      <svg width="130" height="130" viewBox="0 0 130 130">
        <circle class="ring-bg"   cx="65" cy="65" r="55"/>
        <circle class="ring-fill" cx="65" cy="65" r="55" id="ring-circle" stroke-dasharray="345.4" stroke-dashoffset="345.4"/>
      </svg>
      <div class="ring-text">
        <div class="ring-pct" id="ring-pct">0%</div>
        <div class="ring-lbl">score</div>
      </div>
    </div>
    <div class="breakdown">
      <div class="b-row"><span class="b-label">Correct</span>   <span class="b-val g" id="res-correct">0</span></div>
      <div class="b-row"><span class="b-label">Incorrect</span> <span class="b-val r" id="res-wrong">0</span></div>
      <div class="b-row"><span class="b-label">Total</span>     <span class="b-val"   id="res-total">0</span></div>
      <div class="b-row"><span class="b-label">Cluster</span>   <span class="b-val"   id="res-cluster">—</span></div>
    </div>
  </div>

  <div class="results-actions">
    <button class="btn-action primary"   id="btn-again">Play Again</button>
    <button class="btn-action secondary" id="btn-home">Dashboard</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/static/common.js"></script>

<script>
(async () => {
  const user = await requireAuth();
  if (!user) return;
  initTopbar(user);

  const result = Store.get('quiz_result');
  if (!result) { window.location.href = '/app/dashboard.html'; return; }

  const { score, total, cluster } = result;
  const pct = total ? Math.round(score / total * 100) : 0;

  document.getElementById('res-title').innerHTML =
    pct >= 80 ? 'Great <span>Work!</span>' :
    pct >= 50 ? 'Nice <span>Effort!</span>' :
    'Keep <span>Practicing!</span>';
    
  document.getElementById('res-sub').textContent  = `You scored ${pct}% on ${cluster}`;
  document.getElementById('res-correct').textContent = score;
  document.getElementById('res-wrong').textContent   = total - score;
  document.getElementById('res-total').textContent   = total;
  document.getElementById('res-cluster').textContent = cluster;
  document.getElementById('ring-pct').textContent    = pct + '%';

  const ring = document.getElementById('ring-circle');
  ring.style.strokeDashoffset = '345.4';
  ring.style.stroke = pct >= 70 ? 'var(--correct)' : pct >= 40 ? '#f59e0b' : 'var(--wrong)';
  
  setTimeout(() => { 
    ring.style.strokeDashoffset = 345.4 - (pct / 100) * 345.4; 
  }, 100);
})();

document.getElementById('btn-again').onclick = () => window.location.href = '/app/selector.html';
document.getElementById('btn-home').onclick  = () => window.location.href = '/app/dashboard.html';
</script>
</body>
</html>
